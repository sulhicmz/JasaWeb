name: Branch Protection Verification

on:
  schedule:
    # Run branch protection check daily at 4 AM UTC
    - cron: '0 4 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/branch-protection.md'
      - '.github/CODEOWNERS'

env:
  NODE_VERSION: '20'
  CACHE_VERSION: 'v2'

jobs:
  verify-branch-protection:
    name: Verify Branch Protection Rules
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install GitHub CLI
        run: |
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          apt update
          apt install gh -y
      
      - name: Authenticate with GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token
      
      - name: Get current branch protection rules
        id: current-rules
        run: |
          # Get main branch protection
          MAIN_PROTECTION=$(gh api repos/${{ github.repository }}/branches/main/protection 2>/dev/null || echo '{"status": "not_configured"}')
          echo "main_protection<<EOF" >> $GITHUB_OUTPUT
          echo "$MAIN_PROTECTION" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          # Get develop branch protection
          DEVELOP_PROTECTION=$(gh api repos/${{ github.repository }}/branches/develop/protection 2>/dev/null || echo '{"status": "not_configured"}')
          echo "develop_protection<<EOF" >> $GITHUB_OUTPUT
          echo "$DEVELOP_PROTECTION" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          # Check if release branches exist
          RELEASE_BRANCHES=$(gh api repos/${{ github.repository }}/branches --jq '.[].name' | grep '^release/' || echo "")
          echo "release_branches<<EOF" >> $GITHUB_OUTPUT
          echo "$RELEASE_BRANCHES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Verify main branch protection
        run: |
          echo "## 🔒 Main Branch Protection Verification" >> branch-protection-report.md
          echo "" >> branch-protection-report.md
          
          MAIN_PROTECTION='${{ steps.current-rules.outputs.main_protection }}'
          
          if echo "$MAIN_PROTECTION" | grep -q "not_configured"; then
            echo "❌ Main branch protection is NOT configured" >> branch-protection-report.md
            echo "" >> branch-protection-report.md
            echo "### Required Configuration:" >> branch-protection-report.md
            echo "- Require status checks to pass before merging" >> branch-protection-report.md
            echo "- Require branches to be up to date before merging" >> branch-protection-report.md
            echo "- Required approving reviews: 2" >> branch-protection-report.md
            echo "- Require review from Code Owners" >> branch-protection-report.md
            echo "- Include administrators" >> branch-protection-report.md
            echo "- Dismiss stale PR approvals" >> branch-protection-report.md
            echo "- Limit who can push to matching branches" >> branch-protection-report.md
            echo "- Allow force pushes: No" >> branch-protection-report.md
            echo "- Allow deletions: No" >> branch-protection-report.md
          else
            echo "✅ Main branch protection is configured" >> branch-protection-report.md
            
            # Check specific requirements
            if echo "$MAIN_PROTECTION" | jq -e '.required_status_checks.strict' > /dev/null 2>&1; then
              echo "✅ Require up-to-date branches: Enabled" >> branch-protection-report.md
            else
              echo "⚠️ Require up-to-date branches: Not enabled" >> branch-protection-report.md
            fi
            
            if echo "$MAIN_PROTECTION" | jq -e '.required_pull_request_reviews.required_approving_review_count' > /dev/null 2>&1; then
              REVIEW_COUNT=$(echo "$MAIN_PROTECTION" | jq -r '.required_pull_request_reviews.required_approving_review_count')
              if [ "$REVIEW_COUNT" -ge 2 ]; then
                echo "✅ Required approving reviews: $REVIEW_COUNT" >> branch-protection-report.md
              else
                echo "⚠️ Required approving reviews: $REVIEW_COUNT (recommended: 2)" >> branch-protection-report.md
              fi
            else
              echo "❌ Required approving reviews: Not configured" >> branch-protection-report.md
            fi
            
            if echo "$MAIN_PROTECTION" | jq -e '.required_pull_request_reviews.require_code_owner_reviews' > /dev/null 2>&1; then
              echo "✅ Require code owner reviews: Enabled" >> branch-protection-report.md
            else
              echo "⚠️ Require code owner reviews: Not enabled" >> branch-protection-report.md
            fi
            
            if echo "$MAIN_PROTECTION" | jq -e '.enforce_admins.enabled' > /dev/null 2>&1; then
              echo "✅ Include administrators: Enabled" >> branch-protection-report.md
            else
              echo "⚠️ Include administrators: Not enabled" >> branch-protection-report.md
            fi
            
            if echo "$MAIN_PROTECTION" | jq -e '.allow_force_pushes' > /dev/null 2>&1; then
              echo "⚠️ Allow force pushes: Enabled (should be disabled)" >> branch-protection-report.md
            else
              echo "✅ Allow force pushes: Disabled" >> branch-protection-report.md
            fi
            
            if echo "$MAIN_PROTECTION" | jq -e '.allow_deletions' > /dev/null 2>&1; then
              echo "⚠️ Allow deletions: Enabled (should be disabled)" >> branch-protection-report.md
            else
              echo "✅ Allow deletions: Disabled" >> branch-protection-report.md
            fi
          fi
      
      - name: Verify develop branch protection
        run: |
          echo "" >> branch-protection-report.md
          echo "## 🔒 Develop Branch Protection Verification" >> branch-protection-report.md
          echo "" >> branch-protection-report.md
          
          DEVELOP_PROTECTION='${{ steps.current-rules.outputs.develop_protection }}'
          
          if echo "$DEVELOP_PROTECTION" | grep -q "not_configured"; then
            echo "❌ Develop branch protection is NOT configured" >> branch-protection-report.md
            echo "" >> branch-protection-report.md
            echo "### Required Configuration:" >> branch-protection-report.md
            echo "- Require status checks to pass before merging" >> branch-protection-report.md
            echo "- Require branches to be up to date before merging" >> branch-protection-report.md
            echo "- Required approving reviews: 1" >> branch-protection-report.md
            echo "- Dismiss stale PR approvals" >> branch-protection-report.md
            echo "- Include administrators" >> branch-protection-report.md
            echo "- Allow force pushes: Yes (for maintainers only)" >> branch-protection-report.md
            echo "- Allow deletions: No" >> branch-protection-report.md
          else
            echo "✅ Develop branch protection is configured" >> branch-protection-report.md
            
            # Check specific requirements
            if echo "$DEVELOP_PROTECTION" | jq -e '.required_status_checks.strict' > /dev/null 2>&1; then
              echo "✅ Require up-to-date branches: Enabled" >> branch-protection-report.md
            else
              echo "⚠️ Require up-to-date branches: Not enabled" >> branch-protection-report.md
            fi
            
            if echo "$DEVELOP_PROTECTION" | jq -e '.required_pull_request_reviews.required_approving_review_count' > /dev/null 2>&1; then
              REVIEW_COUNT=$(echo "$DEVELOP_PROTECTION" | jq -r '.required_pull_request_reviews.required_approving_review_count')
              if [ "$REVIEW_COUNT" -ge 1 ]; then
                echo "✅ Required approving reviews: $REVIEW_COUNT" >> branch-protection-report.md
              else
                echo "⚠️ Required approving reviews: $REVIEW_COUNT (recommended: 1)" >> branch-protection-report.md
              fi
            else
              echo "❌ Required approving reviews: Not configured" >> branch-protection-report.md
            fi
          fi
      
      - name: Verify release branch protection
        run: |
          echo "" >> branch-protection-report.md
          echo "## 🔒 Release Branch Protection Verification" >> branch-protection-report.md
          echo "" >> branch-protection-report.md
          
          RELEASE_BRANCHES='${{ steps.current-rules.outputs.release_branches }}'
          
          if [ -n "$RELEASE_BRANCHES" ]; then
            echo "Found release branches:" >> branch-protection-report.md
            echo "$RELEASE_BRANCHES" | while read branch; do
              echo "- $branch" >> branch-protection-report.md
              
              # Check protection for each release branch
              BRANCH_PROTECTION=$(gh api repos/${{ github.repository }}/branches/$branch/protection 2>/dev/null || echo '{"status": "not_configured"}')
              
              if echo "$BRANCH_PROTECTION" | grep -q "not_configured"; then
                echo "  ❌ Protection not configured" >> branch-protection-report.md
              else
                echo "  ✅ Protection configured" >> branch-protection-report.md
              fi
            done
          else
            echo "No release branches found" >> branch-protection-report.md
          fi
      
      - name: Verify required status checks
        run: |
          echo "" >> branch-protection-report.md
          echo "## ✅ Required Status Checks Verification" >> branch-protection-report.md
          echo "" >> branch-protection-report.md
          
          # Define expected status checks based on our CI configuration
          EXPECTED_CHECKS=(
            "lint"
            "typecheck" 
            "test"
            "build"
            "security"
          )
          
          MAIN_PROTECTION='${{ steps.current-rules.outputs.main_protection }}'
          
          if echo "$MAIN_PROTECTION" | grep -q "not_configured"; then
            echo "❌ Cannot verify status checks - main branch protection not configured" >> branch-protection-report.md
          else
            echo "Checking for required status checks:" >> branch-protection-report.md
            echo "" >> branch-protection-report.md
            
            for check in "${EXPECTED_CHECKS[@]}"; do
              if echo "$MAIN_PROTECTION" | jq -e ".required_status_checks.checks[] | select(.context == \"$check\")" > /dev/null 2>&1; then
                echo "✅ $check" >> branch-protection-report.md
              else
                echo "❌ $check (missing)" >> branch-protection-report.md
              fi
            done
          fi
      
      - name: Verify CODEOWNERS configuration
        run: |
          echo "" >> branch-protection-report.md
          echo "## 👥 CODEOWNERS Verification" >> branch-protection-report.md
          echo "" >> branch-protection-report.md
          
          if [ -f ".github/CODEOWNERS" ]; then
            echo "✅ CODEOWNERS file exists" >> branch-protection-report.md
            
            # Check for required teams
            if grep -q "@jasaweb-maintainers" .github/CODEOWNERS; then
              echo "✅ jasaweb-maintainers team configured" >> branch-protection-report.md
            else
              echo "⚠️ jasaweb-maintainers team not found in CODEOWNERS" >> branch-protection-report.md
            fi
            
            if grep -q "@jasaweb-frontend" .github/CODEOWNERS; then
              echo "✅ jasaweb-frontend team configured" >> branch-protection-report.md
            else
              echo "⚠️ jasaweb-frontend team not found in CODEOWNERS" >> branch-protection-report.md
            fi
            
            if grep -q "@jasaweb-backend" .github/CODEOWNERS; then
              echo "✅ jasaweb-backend team configured" >> branch-protection-report.md
            else
              echo "⚠️ jasaweb-backend team not found in CODEOWNERS" >> branch-protection-report.md
            fi
          else
            echo "❌ CODEOWNERS file does not exist" >> branch-protection-report.md
          fi
      
      - name: Generate recommendations
        run: |
          echo "" >> branch-protection-report.md
          echo "## 🎯 Recommendations" >> branch-protection-report.md
          echo "" >> branch-protection-report.md
          echo "### Immediate Actions Required:" >> branch-protection-report.md
          echo "1. Configure branch protection for main branch if not already done" >> branch-protection-report.md
          echo "2. Configure branch protection for develop branch if not already done" >> branch-protection-report.md
          echo "3. Ensure all required status checks are configured" >> branch-protection-report.md
          echo "4. Verify CODEOWNERS file exists and teams are properly configured" >> branch-protection-report.md
          echo "" >> branch-protection-report.md
          echo "### Best Practices:" >> branch-protection-report.md
          echo "- Use different protection rules for different branch types" >> branch-protection-report.md
          echo "- Regularly review and update protection rules" >> branch-protection-report.md
          echo "- Monitor branch protection compliance" >> branch-protection-report.md
          echo "- Use signed commits for critical changes" >> branch-protection-report.md
          echo "- Implement branch protection for release branches" >> branch-protection-report.md
          echo "" >> branch-protection-report.md
          echo "### Security Considerations:" >> branch-protection-report.md
          echo "- Never disable branch protection for main branch" >> branch-protection-report.md
          echo "- Use admin enforcement to prevent bypassing rules" >> branch-protection-report.md
          echo "- Require code owner reviews for critical changes" >> branch-protection-report.md
          echo "- Implement status checks for security scanning" >> branch-protection-report.md
          echo "- Use signed commits for release branches" >> branch-protection-report.md
      
      - name: Upload branch protection report
        uses: actions/upload-artifact@v4
        with:
          name: branch-protection-report
          path: branch-protection-report.md
          retention-days: 30
      
      - name: Create issue for missing configurations
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('branch-protection-report.md', 'utf8');
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔒 Branch Protection Configuration Issues Detected',
              body: `## Branch Protection Verification Report

            ${report}

            ## Action Required
            Please review and fix the branch protection configuration issues identified above.

            ---
            *This issue was created automatically by the branch protection verification workflow.*
            `,
              labels: ['security', 'configuration', 'high-priority']
            });
      
      - name: Send notification
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          channel: '#security-alerts'
          text: |
            🔒 Branch Protection Issues Detected
            
            Repository: ${{ github.repository }}
            Date: $(date)
            
            Branch protection configuration issues detected. Please review the report and take corrective action.
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # Automated branch protection setup (optional)
  setup-branch-protection:
    name: Setup Branch Protection (Manual)
    runs-on: ubuntu-latest
    if: github.event.inputs.auto_setup == 'true'
    needs: verify-branch-protection
    
    steps:
      - name: Setup main branch protection
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # This would require GitHub API calls to set up branch protection
          # Note: This requires admin permissions and should be used carefully
          echo "Setting up main branch protection..."
          
          # Example API call (would need proper implementation)
          curl -X PUT \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/branches/main/protection \
            -d '{
              "required_status_checks": {
                "strict": true,
                "contexts": ["lint", "typecheck", "test", "build", "security"]
              },
              "enforce_admins": true,
              "required_pull_request_reviews": {
                "required_approving_review_count": 2,
                "dismiss_stale_reviews": true,
                "require_code_owner_reviews": true
              },
              "restrictions": null,
              "allow_force_pushes": false,
              "allow_deletions": false
            }' || echo "Failed to setup main branch protection"