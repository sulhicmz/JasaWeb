name: oc - PR Manager

on:
  schedule:
    - cron: '*/30 * * * *' # Jalankan setiap 30 menit
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Nomor PR yang akan diproses (opsional)'
        required: false
        type: string

permissions:
  id-token: write
  contents: write
  pull-requests: write
  issues: write
  actions: write
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pr-manager:
    name: OC PR Manager
    runs-on: self-hosted
    timeout-minutes: 60
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
      actions: write
      security-events: write
      
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
      IFLOW_API_KEY: ${{ secrets.IFLOW_API_KEY }}
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}
          
      - name: Install OpenCode CLI
        run: |
          curl -fsSL https://opencode.ai/install | bash
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8.15.0
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Run AI PR Manager
        id: ai-pr-manager
        timeout-minutes: 55
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || github.event.inputs.pr_number }}"
          TRIGGER_EVENT="${{ github.event_name }}"

          opencode run "$(cat <<'PROMPT'
            Anda adalah Manajer PR AI untuk proyek JasaWeb. Tugas Anda adalah mengelola Pull Request (PR) secara efisien, baik yang dipicu oleh jadwal maupun oleh event PR.

            **Konteks Pemicu**:
            - Event: '$TRIGGER_EVENT'
            - Nomor PR (jika ada): '$PR_NUMBER'

            **Strategi Eksekusi**:

            **CASE 1: Jika dipicu oleh `schedule` atau `workflow_dispatch` tanpa nomor PR:**
            1.  **List & Prioritaskan**: Dapatkan daftar semua PR yang terbuka (`gh pr list --state open --json ...`). Abaikan PR yang terkait dengan CI/CD atau perubahan alur kerja.
            2.  **Prioritaskan**: Urutkan PR berdasarkan kriteria: `critical bug fixes` > `security` > `blocking issues` > `features`. Prioritaskan juga PR yang sudah lama terbuka atau yang memiliki status checks yang sudah lolos.
            3.  **Proses PR Tunggal**: Pilih **satu** PR dengan prioritas tertinggi untuk diproses dalam siklus ini.
            4.  **Analisis & Perbaikan**: Untuk PR yang dipilih:
                a.  **Checkout Branch**: `git checkout <branch_name>`
                b.  **Sinkronisasi**: Pastikan branch up-to-date dengan `main` (`git fetch origin main && git merge origin/main`). Tangani konflik jika ada.
                c.  **Analisis Kode & Review**: Lakukan analisis kualitas kode, keamanan, dan pengujian. Periksa komentar review yang ada.
                d.  **Perbaikan Otomatis**: Jalankan `pnpm lint:fix`, `pnpm format`, dan perbaiki masalah umum (misalnya, impor yang tidak digunakan, kesalahan tipe sederhana).
                e.  **Pengujian**: Jalankan `pnpm test` untuk memvalidasi perubahan.
                f.  **Commit & Push**: Jika ada perbaikan, commit dengan pesan yang jelas (`fix: atasi masalah review dan CI`) dan push ke branch PR.
            5.  **Merge atau Set Auto-Merge**: Setelah semua checks lolos (`gh pr view <number> --json statusCheckRollup`), setujui (`gh pr review --approve`) dan gabungkan (`gh pr merge --merge --delete-branch`) jika PR tersebut sederhana dan berisiko rendah. Jika tidak, setel auto-merge (`gh pr merge --auto`).
            6.  **Laporan**: Berikan ringkasan singkat tentang PR yang diproses dan tindakan yang diambil.

            **CASE 2: Jika dipicu oleh `pull_request` (event: '$TRIGGER_EVENT', nomor PR: '$PR_NUMBER'):**
            1.  **Fokus pada PR Saat Ini**: Semua tindakan hanya berlaku untuk PR nomor '$PR_NUMBER'.
            2.  **Analisis Mendalam**: Lakukan analisis komprehensif pada PR:
                a.  **Kualitas Kode**: Periksa standar pengkodean, penanganan error, dan potensi masalah performa.
                b.  **Pengujian**: Pastikan cakupan pengujian memadai.
                c.  **Dokumentasi**: Verifikasi apakah dokumentasi yang relevan telah diperbarui.
            3.  **Perbaikan & Pengujian Otomatis**:
                a.  Jalankan `pnpm lint:fix`, `pnpm format`, `pnpm typecheck`.
                b.  Jalankan suite pengujian lengkap: `pnpm test`.
                c.  Jika ada perbaikan, commit dan push ke branch PR.
            4.  **Review & Komentar**: Posting komentar review di PR. Jika ada masalah, berikan saran perbaikan yang jelas. Jika semuanya baik, setujui PR.
            5.  **Merge atau Set Auto-Merge**: Jika semua checks lolos dan PR disetujui, gabungkan (`gh pr merge --merge --delete-branch`) atau setel auto-merge (`gh pr merge --auto`).

            **Aturan Penting**:
            - Gunakan `GH_TOKEN` untuk semua operasi GitHub.
            - Buat perubahan nyata pada repositori; jangan hanya melaporkan.
            - Tangani error dengan baik dan berikan pesan yang jelas jika terjadi kegagalan.
          PROMPT
          )" \
            --model iflowcn/qwen3-max \
            --share false