name: Environment Management

on:
  repository_dispatch:
    types: [deployment-ready]
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production
      app:
        description: 'Application to deploy'
        required: true
        default: 'all'
        type: choice
        options:
        - all
        - web
        - api

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '8.15.0'
  CACHE_VERSION: 'v2'  # Standardized cache version

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.event.inputs.environment == 'staging' || (github.event_name == 'repository_dispatch' && github.ref == 'refs/heads/develop')
    environment: 
      name: staging
      url: https://staging.jasaweb.com

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.client_payload.ref || github.ref }}

    - name: Setup pnpm
      uses: pnpm/action-setup@v3
      with:
        version: ${{ env.PNPM_VERSION }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'pnpm'
    
    - name: Cache pnpm dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.pnpm-store
          node_modules
          packages/*/node_modules
          apps/*/node_modules
        key: ${{ env.CACHE_VERSION }}-deploy-${{ github.event.inputs.environment || 'staging' }}-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ runner.os }}
        restore-keys: |
          ${{ env.CACHE_VERSION }}-deploy-${{ runner.os }}
          ${{ env.CACHE_VERSION }}-pnpm-${{ runner.os }}

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: '*-build-${{ github.event.client_payload.run_id || github.run_number }}'
        path: builds/

    - name: Deploy to Vercel (Web)
      if: github.event.inputs.app == 'all' || github.event.inputs.app == 'web'
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_WEB }}
        vercel-args: '--prod'
        working-directory: ./apps/web
        alias-domains: |
          staging.jasaweb.com
          jasaweb-git-${{ github.sha }}.vercel.app

    - name: Deploy to Railway (API)
      if: github.event.inputs.app == 'all' || github.event.inputs.app == 'api'
      uses: railway-app/railway-action@v1
      with:
        api-token: ${{ secrets.RAILWAY_TOKEN }}
        service-id: ${{ secrets.RAILWAY_SERVICE_ID_API }}
        environment: staging

    - name: Run health checks
      run: |
        echo "Running health checks..."
        
        # Web health check
        WEB_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://staging.jasaweb.com/health)
        if [ "$WEB_STATUS" != "200" ]; then
          echo "❌ Web health check failed with status $WEB_STATUS"
          exit 1
        fi
        echo "✅ Web health check passed"
        
        # API health check
        API_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api-staging.jasaweb.com/health)
        if [ "$API_STATUS" != "200" ]; then
          echo "❌ API health check failed with status $API_STATUS"
          exit 1
        fi
        echo "✅ API health check passed"

    - name: Run smoke tests
      run: |
        echo "Running smoke tests..."
        
        # Test critical endpoints
        curl -f https://staging.jasaweb.com/ || exit 1
        curl -f https://api-staging.jasaweb.com/health || exit 1
        curl -f https://api-staging.jasaweb.com/auth/status || exit 1
        
        echo "✅ All smoke tests passed"

    - name: Update deployment status
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          await github.rest.repos.createDeploymentStatus({
            owner: context.repo.owner,
            repo: context.repo.repo,
            deployment_id: context.payload.deployment.id,
            state: 'success',
            environment: 'staging',
            environment_url: 'https://staging.jasaweb.com'
          });

    - name: Notify team
      uses: 8398a7/action-slack@v3
      with:
        status: success
        channel: '#deployments'
        text: |
          🚀 Staging Deployment Complete
          
          **Environment**: Staging
          **Commit**: ${{ github.sha }}
          **Apps**: ${{ github.event.inputs.app || 'all' }}
          
          **URLs**:
          - Web: https://staging.jasaweb.com
          - API: https://api-staging.jasaweb.com
          
          **Health Checks**: ✅ Passed
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.event.inputs.environment == 'production' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
    environment: 
      name: production
      url: https://jasaweb.com

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.ref }}

    - name: Setup pnpm
      uses: pnpm/action-setup@v3
      with:
        version: ${{ env.PNPM_VERSION }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'pnpm'
    
    - name: Cache pnpm dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.pnpm-store
          node_modules
          packages/*/node_modules
          apps/*/node_modules
        key: ${{ env.CACHE_VERSION }}-deploy-${{ github.event.inputs.environment || 'production' }}-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ runner.os }}
        restore-keys: |
          ${{ env.CACHE_VERSION }}-deploy-${{ runner.os }}
          ${{ env.CACHE_VERSION }}-pnpm-${{ runner.os }}

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: '*-build-${{ github.run_number }}'
        path: builds/

    - name: Create deployment
      uses: actions/github-script@v7
      id: deployment
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const deployment = await github.rest.repos.createDeployment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            ref: context.ref,
            environment: 'production',
            required_contexts: []
          });
          return deployment.data.id;

    - name: Deploy to Vercel (Web)
      if: github.event.inputs.app == 'all' || github.event.inputs.app == 'web'
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_WEB }}
        vercel-args: '--prod'
        working-directory: ./apps/web

    - name: Deploy to Railway (API)
      if: github.event.inputs.app == 'all' || github.event.inputs.app == 'api'
      uses: railway-app/railway-action@v1
      with:
        api-token: ${{ secrets.RAILWAY_TOKEN }}
        service-id: ${{ secrets.RAILWAY_SERVICE_ID_API }}
        environment: production

    - name: Run production health checks
      run: |
        echo "Running production health checks..."
        
        # Wait for deployment to propagate
        sleep 30
        
        # Web health check
        WEB_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://jasaweb.com/health)
        if [ "$WEB_STATUS" != "200" ]; then
          echo "❌ Web health check failed with status $WEB_STATUS"
          exit 1
        fi
        echo "✅ Web health check passed"
        
        # API health check
        API_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.jasaweb.com/health)
        if [ "$API_STATUS" != "200" ]; then
          echo "❌ API health check failed with status $API_STATUS"
          exit 1
        fi
        echo "✅ API health check passed"

    - name: Run production smoke tests
      run: |
        echo "Running production smoke tests..."
        
        # Test critical user flows
        curl -f https://jasaweb.com/ || exit 1
        curl -f https://api.jasaweb.com/health || exit 1
        curl -f https://jasaweb.com/about || exit 1
        curl -f https://jasaweb.com/services || exit 1
        
        echo "✅ All production smoke tests passed"

    - name: Performance validation
      run: |
        echo "Running performance validation..."
        
        # Check Core Web Vitals
        LCP_THRESHOLD=2500
        FID_THRESHOLD=100
        CLS_THRESHOLD=0.1
        
        # Run Lighthouse audit
        npx lighthouse https://jasaweb.com --output=json --output-path=./lighthouse-report.json --quiet
        
        # Extract performance metrics
        LCP=$(cat lighthouse-report.json | jq -r '.audits["largest-contentful-paint"].numericValue')
        FID=$(cat lighthouse-report.json | jq -r '.audits["max-potential-fid"].numericValue')
        CLS=$(cat lighthouse-report.json | jq -r '.audits["cumulative-layout-shift"].numericValue')
        
        # Validate thresholds
        if (( $(echo "$LCP > $LCP_THRESHOLD" | bc -l) )); then
          echo "❌ LCP $LCP exceeds threshold $LCP_THRESHOLD"
          exit 1
        fi
        
        if (( $(echo "$CLS > $CLS_THRESHOLD" | bc -l) )); then
          echo "❌ CLS $CLS exceeds threshold $CLS_THRESHOLD"
          exit 1
        fi
        
        echo "✅ Performance validation passed"

    - name: Update deployment status
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          await github.rest.repos.createDeploymentStatus({
            owner: context.repo.owner,
            repo: context.repo.repo,
            deployment_id: ${{ steps.deployment.outputs.result }},
            state: 'success',
            environment: 'production',
            environment_url: 'https://jasaweb.com'
          });

    - name: Create release
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        release_name: Release ${{ github.ref_name }}
        body: |
          ## 🚀 Release ${{ github.ref_name }}
          
          **Deployed to**: Production
          **Commit**: ${{ github.sha }}
          **Date**: ${{ github.event.head_commit.timestamp }}
          
          ### Changes
          ${{ github.event.head_commit.message }}
          
          ### 🌐 Live URLs
          - **Web**: https://jasaweb.com
          - **API**: https://api.jasaweb.com
          
          ### ✅ Health Checks
          - All services are operational
          - Performance metrics within thresholds
          - Security scans passed
        draft: false
        prerelease: false

    - name: Notify team
      uses: 8398a7/action-slack@v3
      with:
        status: success
        channel: '#deployments'
        text: |
          🎉 Production Deployment Complete!
          
          **Version**: ${{ github.ref_name || github.sha }}
          **Environment**: Production
          **Apps**: ${{ github.event.inputs.app || 'all' }}
          
          **🌐 Live URLs**:
          - Web: https://jasaweb.com
          - API: https://api.jasaweb.com
          
          **✅ Validation**:
          - Health checks: Passed
          - Performance: Within thresholds
          - Security: Passed
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    if: failure() && (github.event.inputs.environment == 'production' || github.event.inputs.environment == 'staging')
    needs: [deploy-staging, deploy-production]

    steps:
    - name: Get previous successful deployment
      uses: actions/github-script@v7
      id: previous-deployment
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const deployments = await github.rest.repos.listDeployments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            environment: context.payload.inputs.environment || 'production',
            per_page: 10
          });
          
          const successfulDeployment = deployments.data.find(d => 
            d.sha !== context.sha && d.statuses.some(s => s.state === 'success')
          );
          
          if (successfulDeployment) {
            return successfulDeployment.sha;
          }
          return null;

    - name: Rollback to previous version
      if: steps.previous-deployment.outputs.result
      run: |
        echo "Rolling back to commit: ${{ steps.previous-deployment.outputs.result }}"
        
        # Trigger rollback deployment
        curl -X POST \
          -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/dispatches \
          -d '{
            "event_type": "deployment-ready",
            "client_payload": {
              "ref": "${{ steps.previous-deployment.outputs.result }}",
              "sha": "${{ steps.previous-deployment.outputs.result }}",
              "rollback": true
            }
          }'

    - name: Notify rollback
      uses: 8398a7/action-slack@v3
      with:
        status: failure
        channel: '#deployments'
        text: |
          🚨 Deployment Rollback Initiated
          
          **Environment**: ${{ github.event.inputs.environment || 'production' }}
          **Failed Commit**: ${{ github.sha }}
          **Rollback To**: ${{ steps.previous-deployment.outputs.result || 'Not available' }}
          
          Please investigate the failure and fix the issue before redeploying.
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}