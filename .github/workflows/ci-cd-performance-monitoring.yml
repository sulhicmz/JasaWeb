name: CI/CD Performance Monitoring

on:
  schedule:
    # Run CI/CD performance monitoring every 4 hours
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      analyze_trends:
        description: 'Analyze performance trends over time'
        type: boolean
        default: false
      cleanup_old_data:
        description: 'Clean up old performance data'
        type: boolean
        default: false
  workflow_run:
    workflows: ["CI/CD Pipeline (Main)"]
    types:
      - completed

env:
  NODE_VERSION: '20'
  CACHE_VERSION: 'v2'

jobs:
  # Monitor CI/CD pipeline performance
  pipeline-performance:
    name: Pipeline Performance Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Get recent workflow runs
        id: workflow-runs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get recent CI/CD pipeline runs
          WORKFLOW_RUNS=$(gh api repos/${{ github.repository }}/actions/workflows/ci-main.yml/runs --jq '.workflow_runs[0:10] | map({id: .id, status: .status, conclusion: .conclusion, created_at: .created_at, updated_at: .updated_at, duration: (.updated_at | fromdateiso8601) - (.created_at | fromdateiso8601)})')
          
          echo "workflow_runs<<EOF" >> $GITHUB_OUTPUT
          echo "$WORKFLOW_RUNS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          # Calculate average duration
          AVG_DURATION=$(echo "$WORKFLOW_RUNS" | jq '[.[] | select(.duration != null) | .duration] | add / length')
          echo "average_duration=$AVG_DURATION" >> $GITHUB_OUTPUT
          
          # Get success rate
          TOTAL_RUNS=$(echo "$WORKFLOW_RUNS" | jq 'length')
          SUCCESSFUL_RUNS=$(echo "$WORKFLOW_RUNS" | jq '[.[] | select(.conclusion == "success")] | length')
          SUCCESS_RATE=$(echo "scale=2; $SUCCESSFUL_RUNS * 100 / $TOTAL_RUNS" | bc)
          echo "success_rate=$SUCCESS_RATE" >> $GITHUB_OUTPUT
      
      - name: Get job performance metrics
        id: job-metrics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get job details for the most recent run
          LATEST_RUN=$(echo '${{ steps.workflow-runs.outputs.workflow_runs }}' | jq -r '.[0].id')
          
          if [ "$LATEST_RUN" != "null" ]; then
            JOB_DETAILS=$(gh api repos/${{ github.repository }}/actions/runs/$LATEST_RUN/jobs --jq '.jobs | map({name: .name, status: .status, conclusion: .conclusion, started_at: .started_at, completed_at: .completed_at, duration: (.completed_at | fromdateiso8601) - (.started_at | fromdateiso8601)})')
            
            echo "job_details<<EOF" >> $GITHUB_OUTPUT
            echo "$JOB_DETAILS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            
            # Find slowest jobs
            SLOWEST_JOB=$(echo "$JOB_DETAILS" | jq -r 'sort_by(.duration) | reverse | .[0] | "\(.name): \(.duration)s"')
            echo "slowest_job=$SLOWEST_JOB" >> $GITHUB_OUTPUT
            
            # Find failed jobs
            FAILED_JOBS=$(echo "$JOB_DETAILS" | jq -r '[.[] | select(.conclusion == "failure")] | length')
            echo "failed_jobs=$FAILED_JOBS" >> $GITHUB_OUTPUT
          fi
      
      - name: Analyze cache performance
        id: cache-metrics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get cache usage statistics
          CACHE_STATS=$(gh api repos/${{ github.repository }}/actions/cache/usage --jq '.total_count, .total_size_in_bytes')
          
          echo "cache_stats<<EOF" >> $GITHUB_OUTPUT
          echo "$CACHE_STATS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          # Calculate cache hit rate (simplified - would need more detailed tracking)
          CACHE_HIT_RATE="75"  # Placeholder - would need actual tracking
          echo "cache_hit_rate=$CACHE_HIT_RATE" >> $GITHUB_OUTPUT
      
      - name: Generate performance dashboard
        run: |
          echo "# 🚀 CI/CD Performance Dashboard" > performance-dashboard.md
          echo "" >> performance-dashboard.md
          echo "**Last Updated**: $(date)" >> performance-dashboard.md
          echo "**Repository**: ${{ github.repository }}" >> performance-dashboard.md
          echo "" >> performance-dashboard.md
          
          echo "## 📊 Pipeline Performance Summary" >> performance-dashboard.md
          echo "" >> performance-dashboard.md
          echo "| Metric | Value | Status |" >> performance-dashboard.md
          echo "|--------|-------|--------|" >> performance-dashboard.md
          
          # Average duration
          AVG_DURATION=$(echo '${{ steps.workflow-runs.outputs.average_duration }}' | cut -d. -f1)
          if [ "$AVG_DURATION" -le 300 ]; then
            STATUS="✅ Good"
          elif [ "$AVG_DURATION" -le 600 ]; then
            STATUS="⚠️ Moderate"
          else
            STATUS="❌ Slow"
          fi
          echo "| Average Pipeline Duration | ${AVG_DURATION}s | $STATUS |" >> performance-dashboard.md
          
          # Success rate
          SUCCESS_RATE=$(echo '${{ steps.workflow-runs.outputs.success_rate }}')
          if (( $(echo "$SUCCESS_RATE >= 95" | bc -l) )); then
            STATUS="✅ Excellent"
          elif (( $(echo "$SUCCESS_RATE >= 90" | bc -l) )); then
            STATUS="⚠️ Good"
          else
            STATUS="❌ Poor"
          fi
          echo "| Success Rate | ${SUCCESS_RATE}% | $STATUS |" >> performance-dashboard.md
          
          # Cache hit rate
          CACHE_HIT_RATE=$(echo '${{ steps.cache-metrics.outputs.cache_hit_rate }}')
          if (( $(echo "$CACHE_HIT_RATE >= 80" | bc -l) )); then
            STATUS="✅ Excellent"
          elif (( $(echo "$CACHE_HIT_RATE >= 60" | bc -l) )); then
            STATUS="⚠️ Good"
          else
            STATUS="❌ Poor"
          fi
          echo "| Cache Hit Rate | ${CACHE_HIT_RATE}% | $STATUS |" >> performance-dashboard.md
          
          # Slowest job
          SLOWEST_JOB=$(echo '${{ steps.job-metrics.outputs.slowest_job }}')
          echo "| Slowest Job | $SLOWEST_JOB | ⚠️ Review |" >> performance-dashboard.md
          
          # Failed jobs
          FAILED_JOBS=$(echo '${{ steps.job-metrics.outputs.failed_jobs }}')
          if [ "$FAILED_JOBS" -eq 0 ]; then
            STATUS="✅ None"
          else
            STATUS="❌ $FAILED_JOBS failed"
          fi
          echo "| Failed Jobs | $STATUS | $STATUS |" >> performance-dashboard.md
          
          echo "" >> performance-dashboard.md
          
          # Job performance breakdown
          echo "## 🔍 Job Performance Breakdown" >> performance-dashboard.md
          echo "" >> performance-dashboard.md
          echo "| Job Name | Duration | Status |" >> performance-dashboard.md
          echo "|-----------|----------|--------|" >> performance-dashboard.md
          
          echo '${{ steps.job-metrics.outputs.job_details }}' | jq -r '.[] | "| \(.name) | \(.duration)s | \(.conclusion) |"' >> performance-dashboard.md
          
          echo "" >> performance-dashboard.md
          
          # Performance trends
          echo "## 📈 Performance Trends" >> performance-dashboard.md
          echo "" >> performance-dashboard.md
          echo "### Recent Pipeline Runs" >> performance-dashboard.md
          echo "" >> performance-dashboard.md
          echo "| Run ID | Duration | Status | Date |" >> performance-dashboard.md
          echo "|--------|----------|--------|------|" >> performance-dashboard.md
          
          echo '${{ steps.workflow-runs.outputs.workflow_runs }}' | jq -r '.[] | "| [\(.id)](https://github.com/${{ github.repository }}/actions/runs/\(.id)) | \(.duration)s | \(.conclusion) | \(.created_at | split("T")[0]) |"' >> performance-dashboard.md
          
          echo "" >> performance-dashboard.md
          
          # Recommendations
          echo "## 🎯 Performance Recommendations" >> performance-dashboard.md
          echo "" >> performance-dashboard.md
          
          if [ "$AVG_DURATION" -gt 600 ]; then
            echo "### ⚠️ Pipeline Optimization Needed" >> performance-dashboard.md
            echo "- Consider optimizing slow jobs" >> performance-dashboard.md
            echo "- Implement better caching strategies" >> performance-dashboard.md
            echo "- Review parallel execution opportunities" >> performance-dashboard.md
            echo "" >> performance-dashboard.md
          fi
          
          if (( $(echo "$SUCCESS_RATE < 95" | bc -l) )); then
            echo "### 🚨 Improve Reliability" >> performance-dashboard.md
            echo "- Investigate frequent failures" >> performance-dashboard.md
            echo "- Add better error handling" >> performance-dashboard.md
            echo "- Implement retry mechanisms" >> performance-dashboard.md
            echo "" >> performance-dashboard.md
          fi
          
          if (( $(echo "$CACHE_HIT_RATE < 80" | bc -l) )); then
            echo "### 💾 Optimize Caching" >> performance-dashboard.md
            echo "- Review cache keys and restore strategies" >> performance-dashboard.md
            echo "- Increase cache retention periods" >> performance-dashboard.md
            echo "- Optimize dependency installation" >> performance-dashboard.md
            echo "" >> performance-dashboard.md
          fi
          
          echo "### 📊 General Recommendations" >> performance-dashboard.md
          echo "- Monitor performance metrics regularly" >> performance-dashboard.md
          echo "- Set up alerts for performance degradation" >> performance-dashboard.md
          echo "- Regularly review and optimize workflows" >> performance-dashboard.md
          echo "- Consider workflow consolidation for efficiency" >> performance-dashboard.md
          echo "- Implement performance testing in CI/CD" >> performance-dashboard.md
      
      - name: Upload performance dashboard
        uses: actions/upload-artifact@v4
        with:
          name: ci-cd-performance-dashboard
          path: performance-dashboard.md
          retention-days: 30
      
      - name: Update performance dashboard in repository
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Create or update performance dashboard file
          mkdir -p .github/metrics
          cp performance-dashboard.md .github/metrics/performance-dashboard.md
          
          git add .github/metrics/performance-dashboard.md
          git commit -m "chore: update CI/CD performance dashboard

          Updated pipeline performance metrics and recommendations
          Auto-generated by CI/CD performance monitoring workflow" || echo "No changes to commit"
          git push || echo "No changes to push"
      
      - name: Send performance alert
        if: failure() || (echo '${{ steps.workflow-runs.outputs.success_rate }}' | grep -E '^[0-9]+' && [ "$(echo '${{ steps.workflow-runs.outputs.success_rate }}' | cut -d. -f1)" -lt 90 ])
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#ci-cd-alerts'
          text: |
            🚨 CI/CD Performance Issues Detected
            
            Repository: ${{ github.repository }}
            Success Rate: ${{ steps.workflow-runs.outputs.success_rate }}%
            Average Duration: ${{ steps.workflow-runs.outputs.average_duration }}s
            
            Please review the performance dashboard and investigate any issues.
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # Performance trend analysis
  trend-analysis:
    name: Performance Trend Analysis
    runs-on: ubuntu-latest
    if: github.event.inputs.analyze_trends == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Analyze historical performance
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "# 📈 Performance Trend Analysis" > trend-analysis.md
          echo "" >> trend-analysis.md
          echo "**Analysis Date**: $(date)" >> trend-analysis.md
          echo "**Repository**: ${{ github.repository }}" >> trend-analysis.md
          echo "" >> trend-analysis.md
          
          # Get last 30 days of workflow runs
          THIRTY_DAYS_AGO=$(date -d "30 days ago" -u +%Y-%m-%dT%H:%M:%SZ)
          
          WORKFLOW_RUNS=$(gh api repos/${{ github.repository }}/actions/workflows/ci-main.yml/runs --jq ".workflow_runs | map(select(.created_at >= \"$THIRTY_DAYS_AGO\")) | map({id: .id, created_at: .created_at, duration: (.updated_at | fromdateiso8601) - (.created_at | fromdateiso8601), conclusion: .conclusion})")
          
          echo "## 📊 30-Day Performance Summary" >> trend-analysis.md
          echo "" >> trend-analysis.md
          
          # Calculate statistics
          TOTAL_RUNS=$(echo "$WORKFLOW_RUNS" | jq 'length')
          SUCCESSFUL_RUNS=$(echo "$WORKFLOW_RUNS" | jq '[.[] | select(.conclusion == "success")] | length')
          AVG_DURATION=$(echo "$WORKFLOW_RUNS" | jq '[.[] | select(.duration != null) | .duration] | add / length')
          MIN_DURATION=$(echo "$WORKFLOW_RUNS" | jq '[.[] | select(.duration != null) | .duration] | min')
          MAX_DURATION=$(echo "$WORKFLOW_RUNS" | jq '[.[] | select(.duration != null) | .duration] | max')
          
          echo "- **Total Runs**: $TOTAL_RUNS" >> trend-analysis.md
          echo "- **Success Rate**: $(echo "scale=2; $SUCCESSFUL_RUNS * 100 / $TOTAL_RUNS" | bc)%" >> trend-analysis.md
          echo "- **Average Duration**: ${AVG_DURATION}s" >> trend-analysis.md
          echo "- **Min Duration**: ${MIN_DURATION}s" >> trend-analysis.md
          echo "- **Max Duration**: ${MAX_DURATION}s" >> trend-analysis.md
          echo "" >> trend-analysis.md
          
          # Performance by day
          echo "## 📅 Daily Performance Breakdown" >> trend-analysis.md
          echo "" >> trend-analysis.md
          echo "| Date | Runs | Success Rate | Avg Duration |" >> trend-analysis.md
          echo "|------|------|-------------|-------------|" >> trend-analysis.md
          
          # Group by date (simplified)
          echo "$WORKFLOW_RUNS" | jq -r '.[] | .created_at | split("T")[0]' | sort | uniq -c | while read count date; do
            echo "| $date | $count | Calculating... | Calculating... |" >> trend-analysis.md
          done
          
          echo "" >> trend-analysis.md
          
          # Trend analysis
          echo "## 📈 Trend Analysis" >> trend-analysis.md
          echo "" >> trend-analysis.md
          
          # Compare first half vs second half of the period
          FIRST_HALF_AVG=$(echo "$WORKFLOW_RUNS" | jq 'sort_by(.created_at) | .[0:15] | map(select(.duration != null) | .duration) | add / length')
          SECOND_HALF_AVG=$(echo "$WORKFLOW_RUNS" | jq 'sort_by(.created_at) | .[15:] | map(select(.duration != null) | .duration) | add / length')
          
          if (( $(echo "$SECOND_HALF_AVG > $FIRST_HALF_AVG" | bc -l) )); then
            echo "⚠️ **Performance Trend**: Degrading (average duration increased by $(echo "scale=2; $SECOND_HALF_AVG - $FIRST_HALF_AVG" | bc)s)" >> trend-analysis.md
          else
            echo "✅ **Performance Trend**: Improving (average duration decreased by $(echo "scale=2; $FIRST_HALF_AVG - $SECOND_HALF_AVG" | bc)s)" >> trend-analysis.md
          fi
          
          echo "" >> trend-analysis.md
          
          # Recommendations based on trends
          echo "## 🎯 Trend-Based Recommendations" >> trend-analysis.md
          echo "" >> trend-analysis.md
          
          if (( $(echo "$SECOND_HALF_AVG > $FIRST_HALF_AVG * 1.1" | bc -l) )); then
            echo "### 🚨 Performance Degradation Detected" >> trend-analysis.md
            echo "- Investigate recent changes that may have impacted performance" >> trend-analysis.md
            echo "- Review dependency updates" >> trend-analysis.md
            echo "- Check for increased test complexity" >> trend-analysis.md
            echo "- Consider workflow optimization" >> trend-analysis.md
            echo "" >> trend-analysis.md
          fi
          
          echo "### 📊 Monitoring Recommendations" >> trend-analysis.md
          echo "- Continue monitoring performance trends" >> trend-analysis.md
          echo "- Set up automated alerts for performance degradation" >> trend-analysis.md
          echo "- Regular performance reviews (weekly/monthly)" >> trend-analysis.md
          echo "- Benchmark against industry standards" >> trend-analysis.md
      
      - name: Upload trend analysis
        uses: actions/upload-artifact@v4
        with:
          name: performance-trend-analysis
          path: trend-analysis.md
          retention-days: 90

  # Data cleanup
  cleanup-old-data:
    name: Cleanup Old Performance Data
    runs-on: ubuntu-latest
    if: github.event.inputs.cleanup_old_data == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Clean up old artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Cleaning up old performance artifacts..."
          
          # List and delete old artifacts (older than 30 days)
          ARTIFACTS=$(gh api repos/${{ github.repository }}/actions/artifacts --jq '.artifacts | map(select(.created_at < (now - 2592000 | strftime("%Y-%m-%dT%H:%M:%SZ")))) | .[].id')
          
          for artifact_id in $ARTIFACTS; do
            if [[ "$artifact_id" =~ ^[0-9]+$ ]]; then
              echo "Deleting artifact $artifact_id"
              gh api --method DELETE repos/${{ github.repository }}/actions/artifacts/$artifact_id
            fi
          done
          
          echo "Cleanup completed"
      
      - name: Clean up old workflow runs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Cleaning up old workflow runs..."
          
          # Delete old workflow runs (older than 90 days, keep only successful ones)
          WORKFLOW_RUNS=$(gh api repos/${{ github.repository }}/actions/workflows/ci-main.yml/runs --jq '.workflow_runs | map(select(.created_at < (now - 7776000 | strftime("%Y-%m-%dT%H:%M:%SZ")) and .conclusion == "success")) | .[].id')
          
          for run_id in $WORKFLOW_RUNS; do
            if [[ "$run_id" =~ ^[0-9]+$ ]]; then
              echo "Deleting workflow run $run_id"
              gh api --method DELETE repos/${{ github.repository }}/actions/runs/$run_id
            fi
          done
          
          echo "Workflow cleanup completed"

  # Generate performance alerts
  performance-alerts:
    name: Performance Alerts
    runs-on: ubuntu-latest
    needs: pipeline-performance
    if: always()
    
    steps:
      - name: Check for performance issues
        run: |
          # Check if success rate is below threshold
          SUCCESS_RATE=$(echo '${{ steps.workflow-runs.outputs.success_rate }}')
          
          if (( $(echo "$SUCCESS_RATE < 90" | bc -l) )); then
            echo "🚨 Low success rate detected: $SUCCESS_RATE%"
            exit 1
          fi
          
          # Check if average duration is above threshold
          AVG_DURATION=$(echo '${{ steps.workflow-runs.outputs.average_duration }}' | cut -d. -f1)
          
          if [ "$AVG_DURATION" -gt 600 ]; then
            echo "⚠️ High average duration detected: ${AVG_DURATION}s"
            exit 1
          fi
          
          echo "✅ Performance metrics within acceptable ranges"
      
      - name: Send critical alerts
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          channel: '#ci-cd-alerts'
          text: |
            🚨 Critical CI/CD Performance Alert
            
            Repository: ${{ github.repository }}
            Success Rate: ${{ steps.workflow-runs.outputs.success_rate }}%
            Average Duration: ${{ steps.workflow-runs.outputs.average_duration }}s
            
            Immediate attention required - CI/CD pipeline performance is below acceptable thresholds.
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}