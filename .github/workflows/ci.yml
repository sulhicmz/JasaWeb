name: 'CI Pipeline'

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.gitignore'
      - 'LICENSE'
      - '**/README.md'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.gitignore'
      - 'LICENSE'
      - '**/README.md'

concurrency:
  group: '${{ github.workflow }}-${{ github.head_ref || github.ref }}'
  cancel-in-progress: true

defaults:
  run:
    shell: 'bash'

permissions:
  contents: 'read'
  packages: 'read'
  statuses: 'write'

jobs:
  # Setup job with caching
  setup:
    runs-on: 'ubuntu-latest'
    outputs:
      node_version: '20'
      pnpm_version: '8.15.0'
    steps:
      - name: 'Checkout repository'
        uses: 'actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683'

      - name: 'Setup Node.js'
        uses: 'actions/setup-node@1d0ff4f03b81e0f8d0e6a0d6d47e9b7c02d4c6b1'
        with:
          node-version: '${{ env.NODE_VERSION || '20' }}'

      - name: 'Setup pnpm'
        uses: 'pnpm/action-setup@v4'
        with:
          version: '${{ env.PNPM_VERSION || '8.15.0' }}'

      - name: 'Get pnpm store directory'
        id: 'pnpm-cache'
        run: 'echo "pnpm_cache_dir=$(pnpm store path)" >> $GITHUB_OUTPUT'

      - name: 'Setup pnpm cache'
        uses: 'actions/cache@v4'
        with:
          path: '${{ steps.pnpm-cache.outputs.pnpm_cache_dir }}'
          key: '${{ runner.os }}-pnpm-store-${{ hashFiles(''**/pnpm-lock.yaml'') }}'
          restore-keys: '${{ runner.os }}-pnpm-store-'

      - name: 'Install dependencies'
        run: 'pnpm install --frozen-lockfile'

      - name: 'Cache node_modules'
        id: 'node-modules-cache'
        uses: 'actions/cache@v4'
        with:
          path: 'node_modules'
          key: '${{ runner.os }}-node-modules-${{ hashFiles(''**/pnpm-lock.yaml'') }}'
          restore-keys: '${{ runner.os }}-node-modules-'

  # Determine what to run based on file changes
  changes:
    runs-on: 'ubuntu-latest'
    outputs:
      web: ${{ steps.changes.outputs.web }}
      api: ${{ steps.changes.outputs.api }}
      ui: ${{ steps.changes.outputs.ui }}
    steps:
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            web:
              - 'apps/web/**'
            api:
              - 'apps/api/**'
            ui:
              - 'packages/ui/**'

  # Quality checks job
  quality-checks:
    needs: [setup]
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'Checkout repository'
        uses: 'actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683'

      - name: 'Setup Node.js'
        uses: 'actions/setup-node@1d0ff4f03b81e0f8d0e6a0d6d47e9b7c02d4c6b1'
        with:
          node-version: '${{ needs.setup.outputs.node_version }}'

      - name: 'Setup pnpm'
        uses: 'pnpm/action-setup@v4'
        with:
          version: '${{ needs.setup.outputs.pnpm_version }}'

      - name: 'Get pnpm store directory'
        id: 'pnpm-cache'
        run: 'echo "pnpm_cache_dir=$(pnpm store path)" >> $GITHUB_OUTPUT'

      - name: 'Restore pnpm cache'
        uses: 'actions/cache@v4'
        with:
          path: '${{ steps.pnpm-cache.outputs.pnpm_cache_dir }}'
          key: '${{ runner.os }}-pnpm-store-${{ hashFiles(''**/pnpm-lock.yaml'') }}'

      - name: 'Install dependencies'
        run: 'pnpm install --frozen-lockfile'

      - name: 'Run linting'
        run: 'pnpm lint'

      - name: 'Run formatting check'
        run: 'pnpm format:check'

      - name: 'Run type checking'
        run: 'pnpm typecheck'

  # Test job
  test:
    needs: [setup, changes]
    runs-on: 'ubuntu-latest'
    strategy:
      fail-fast: false
    steps:
      - name: 'Checkout repository'
        uses: 'actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683'

      - name: 'Setup Node.js'
        uses: 'actions/setup-node@1d0ff4f03b81e0f8d0e6a0d6d47e9b7c02d4c6b1'
        with:
          node-version: '${{ needs.setup.outputs.node_version }}'

      - name: 'Setup pnpm'
        uses: 'pnpm/action-setup@v4'
        with:
          version: '${{ needs.setup.outputs.pnpm_version }}'

      - name: 'Get pnpm store directory'
        id: 'pnpm-cache'
        run: 'echo "pnpm_cache_dir=$(pnpm store path)" >> $GITHUB_OUTPUT'

      - name: 'Restore pnpm cache'
        uses: 'actions/cache@v4'
        with:
          path: '${{ steps.pnpm-cache.outputs.pnpm_cache_dir }}'
          key: '${{ runner.os }}-pnpm-store-${{ hashFiles(''**/pnpm-lock.yaml'') }}'

      - name: 'Install dependencies'
        run: 'pnpm install --frozen-lockfile'

      # Only run API tests if API files were changed
      - name: 'Run API tests'
        if: ${{ needs.changes.outputs.api == 'true' || needs.changes.outputs.all == 'true' }}
        run: 'cd apps/api && pnpm test -- --run --maxWorkers=2'

      # Only run web tests if web files were changed
      - name: 'Run web tests'
        if: ${{ needs.changes.outputs.web == 'true' || needs.changes.outputs.all == 'true' }}
        run: 'cd apps/web && pnpm test'

  # Security scan job
  security:
    needs: [setup]
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'Checkout repository'
        uses: 'actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683'

      - name: 'Setup Node.js'
        uses: 'actions/setup-node@1d0ff4f03b81e0f8d0e6a0d6d47e9b7c02d4c6b1'
        with:
          node-version: '${{ needs.setup.outputs.node_version }}'

      - name: 'Setup pnpm'
        uses: 'pnpm/action-setup@v4'
        with:
          version: '${{ needs.setup.outputs.pnpm_version }}'

      - name: 'Get pnpm store directory'
        id: 'pnpm-cache'
        run: 'echo "pnpm_cache_dir=$(pnpm store path)" >> $GITHUB_OUTPUT'

      - name: 'Restore pnpm cache'
        uses: 'actions/cache@v4'
        with:
          path: '${{ steps.pnpm-cache.outputs.pnpm_cache_dir }}'
          key: '${{ runner.os }}-pnpm-store-${{ hashFiles(''**/pnpm-lock.yaml'') }}'

      - name: 'Install dependencies'
        run: 'pnpm install --frozen-lockfile'

      - name: 'Run security audit'
        run: 'pnpm security:audit'

      - name: 'Run security scan'
        run: 'pnpm security:scan'

  # Build job (only runs if needed files were changed)
  build:
    needs: [setup, changes]
    runs-on: 'ubuntu-latest'
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: 'web'
            condition: ${{ needs.changes.outputs.web == 'true' || needs.changes.outputs.all == 'true' }}
          - app: 'api'
            condition: ${{ needs.changes.outputs.api == 'true' || needs.changes.outputs.all == 'true' }}
    if: ${{ matrix.condition == 'true' }}
    steps:
      - name: 'Checkout repository'
        uses: 'actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683'

      - name: 'Setup Node.js'
        uses: 'actions/setup-node@1d0ff4f03b81e0f8d0e6a0d6d47e9b7c02d4c6b1'
        with:
          node-version: '${{ needs.setup.outputs.node_version }}'

      - name: 'Setup pnpm'
        uses: 'pnpm/action-setup@v4'
        with:
          version: '${{ needs.setup.outputs.pnpm_version }}'

      - name: 'Get pnpm store directory'
        id: 'pnpm-cache'
        run: 'echo "pnpm_cache_dir=$(pnpm store path)" >> $GITHUB_OUTPUT'

      - name: 'Restore pnpm cache'
        uses: 'actions/cache@v4'
        with:
          path: '${{ steps.pnpm-cache.outputs.pnpm_cache_dir }}'
          key: '${{ runner.os }}-pnpm-store-${{ hashFiles(''**/pnpm-lock.yaml'') }}'

      - name: 'Install dependencies'
        run: 'pnpm install --frozen-lockfile'

      - name: 'Build ${{ matrix.app }} app'
        run: 'pnpm build:${{ matrix.app }}'

      - name: 'Upload ${{ matrix.app }} build artifacts'
        uses: 'actions/upload-artifact@v4'
        with:
          name: '${{ matrix.app }}-build'
          path: 'apps/${{ matrix.app }}/dist/'
          retention-days: 7

  # Status check job
  status-check:
    needs: [setup, quality-checks, test, security, build]
    runs-on: 'ubuntu-latest'
    if: ${{ always() }}
    steps:
      - name: 'Check job statuses'
        run: |
          quality_status="${{ needs.quality-checks.result }}"
          test_status="${{ needs.test.result }}"
          security_status="${{ needs.security.result }}"
          build_status="${{ needs.build.result }}"

          echo "Quality checks: $quality_status"
          echo "Tests: $test_status"
          echo "Security: $security_status"
          echo "Build: $build_status"

          if [[ "$quality_status" == "failure" || "$test_status" == "failure" || "$security_status" == "failure" ]]; then
            echo "❌ Some jobs failed"
            exit 1
          else
            echo "✅ All required jobs passed"
          fi
