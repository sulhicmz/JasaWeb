name: Enhanced Security Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run security scan daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '8.15.0'
  CACHE_VERSION: 'v2'  # Standardized cache version

jobs:
  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for better secret detection
    
    - name: Run TruffleHog secret scanning
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: main
        head: HEAD
        extra_args: --debug --json
    
    - name: Run Gitleaks
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
    
    - name: Upload scan results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-scan-results
        path: |
          trufflehog-output.json
          gitleaks-report.json
        retention-days: 30

  dependency-security:
    name: Dependency Security Audit
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        package: [root, api, web, ui, config, testing]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup pnpm
      uses: pnpm/action-setup@v3
      with:
        version: ${{ env.PNPM_VERSION }}
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'pnpm'
    
    - name: Cache pnpm dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.pnpm-store
          node_modules
          packages/*/node_modules
          apps/*/node_modules
        key: ${{ env.CACHE_VERSION }}-security-${{ matrix.package }}-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ runner.os }}
        restore-keys: |
          ${{ env.CACHE_VERSION }}-security-${{ matrix.package }}-${{ runner.os }}
          ${{ env.CACHE_VERSION }}-pnpm-${{ runner.os }}
    
    - name: Install dependencies
      run: |
        if [ "${{ matrix.package }}" = "root" ]; then
          pnpm install --frozen-lockfile
        else
          cd packages/${{ matrix.package }} || cd apps/${{ matrix.package }}
          pnpm install --frozen-lockfile
        fi
    
    - name: Run npm audit
      run: |
        if [ "${{ matrix.package }}" = "root" ]; then
          pnpm audit --audit-level moderate
        else
          cd packages/${{ matrix.package }} || cd apps/${{ matrix.package }}
          pnpm audit --audit-level moderate
        fi
    
    - name: Run Snyk security scan
      uses: snyk/actions/node@master
      continue-on-error: true
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high

  container-security:
    name: Container Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Build Docker image
      run: |
        docker build -t jasaweb-api:latest -f apps/api/Dockerfile .
        docker build -t jasaweb-web:latest -f apps/web/Dockerfile .
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'jasaweb-api:latest'
        format: 'sarif'
        output: 'trivy-api-results.sarif'
    
    - name: Run Trivy on web image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'jasaweb-web:latest'
        format: 'sarif'
        output: 'trivy-web-results.sarif'
    
    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-api-results.sarif'
    
    - name: Upload web scan results
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-web-results.sarif'

  code-security-analysis:
    name: Code Security Analysis
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup pnpm
      uses: pnpm/action-setup@v3
      with:
        version: ${{ env.PNPM_VERSION }}
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'pnpm'
    
    - name: Cache pnpm dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.pnpm-store
          node_modules
          packages/*/node_modules
          apps/*/node_modules
        key: ${{ env.CACHE_VERSION }}-security-code-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ runner.os }}
        restore-keys: |
          ${{ env.CACHE_VERSION }}-security-code-${{ runner.os }}
          ${{ env.CACHE_VERSION }}-pnpm-${{ runner.os }}
    
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
    
    - name: Run Semgrep security scan
      uses: semgrep/semgrep-action@v1
      with:
        config: >-
          p/security-audit
          p/secrets
          p/owasp-top-ten
          p/nodejs
          p/typescript
    
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: typescript, javascript
    
    - name: Autobuild
      uses: github/codeql-action/autobuild@v3
    
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3

  security-report:
    name: Security Report
    runs-on: ubuntu-latest
    needs: [secret-scanning, dependency-security, container-security, code-security-analysis]
    if: always()
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts/
    
    - name: Generate security summary
      run: |
        echo "# Security Scan Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Scan Results" >> $GITHUB_STEP_SUMMARY
        echo "- Secret Scanning: ${{ needs.secret-scanning.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- Dependency Security: ${{ needs.dependency-security.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- Container Security: ${{ needs.container-security.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- Code Security Analysis: ${{ needs.code-security-analysis.result }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "For detailed results, check the uploaded artifacts." >> $GITHUB_STEP_SUMMARY
    
    - name: Notify on security issues
      if: contains(needs.*.result, 'failure')
      uses: 8398a7/action-slack@v3
      with:
        status: failure
        channel: '#security-alerts'
        text: '🚨 Security scan detected issues in JasaWeb repository'
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}