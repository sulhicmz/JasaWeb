    - "testing"

# GitHub Actions dependencies
- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: "weekly"
    day: "monday"
    time: "09:00"
  open-pull-requests-limit: 5
  reviewers:
    - "jasaweb-maintainers"
  assignees:
    - "jasaweb-maintainers"
  commit-message:
    prefix: "ci"
    include: "scope"
  labels:
    - "dependencies"
    - "github-actions"

# Docker dependencies
- package-ecosystem: "docker"
  directory: "/"
  schedule:
    interval: "weekly"
    day: "monday"
