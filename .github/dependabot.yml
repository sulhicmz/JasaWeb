version: 2
updates:
# Root package dependencies
- package-ecosystem: "npm"
  directory: "/"
  schedule:
    interval: "weekly"
    day: "monday"
    time: "09:00"
  open-pull-requests-limit: 10
  reviewers:
    - "jasaweb-maintainers"
  assignees:
    - "jasaweb-maintainers"
  commit-message:
    prefix: "deps"
    include: "scope"
  labels:
    - "dependencies"
    - "npm"
  allow:
    - dependency-type: "production"
    - dependency-type: "development"

# API package dependencies
- package-ecosystem: "npm"
  directory: "/apps/api"
  schedule:
    interval: "weekly"
    day: "monday"
    time: "09:00"
  open-pull-requests-limit: 5
  reviewers:
    - "jasaweb-backend"
  assignees:
    - "jasaweb-maintainers"
  commit-message:
    prefix: "deps(api)"
    include: "scope"
  labels:
    - "dependencies"
    - "npm"
    - "api"

# Web package dependencies
- package-ecosystem: "npm"
  directory: "/apps/web"
  schedule:
    interval: "weekly"
    day: "monday"
    time: "09:00"
  open-pull-requests-limit: 5
  reviewers:
    - "jasaweb-frontend"
  assignees:
    - "jasaweb-maintainers"
  commit-message:
    prefix: "deps(web)"
    include: "scope"
  labels:
    - "dependencies"
    - "npm"
    - "web"

# UI package dependencies
- package-ecosystem: "npm"
  directory: "/packages/ui"
  schedule:
    interval: "weekly"
    day: "monday"
    time: "09:00"
  open-pull-requests-limit: 5
  reviewers:
    - "jasaweb-frontend"
  assignees:
    - "jasaweb-maintainers"
  commit-message:
    prefix: "deps(ui)"
    include: "scope"
  labels:
    - "dependencies"
    - "npm"
    - "ui"

# Config package dependencies
- package-ecosystem: "npm"
  directory: "/packages/config"
  schedule:
    interval: "weekly"
    day: "monday"
    time: "09:00"
  open-pull-requests-limit: 5
  reviewers:
    - "jasaweb-backend"
    - "jasaweb-frontend"
  assignees:
    - "jasaweb-maintainers"
  commit-message:
    prefix: "deps(config)"
    include: "scope"
  labels:
    - "dependencies"
    - "npm"
    - "config"

# Testing package dependencies
- package-ecosystem: "npm"
  directory: "/packages/testing"
  schedule:
    interval: "weekly"
    day: "monday"
    time: "09:00"
  open-pull-requests-limit: 5
  reviewers:
    - "jasaweb-backend"
    - "jasaweb-frontend"
  assignees:
    - "jasaweb-maintainers"
  commit-message:
    prefix: "deps(testing)"
    include: "scope"
  labels:
